<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum | DuoCortex</title>
  <meta name="description" content="Read discussions, questions and answers from verified medical students and professionals on the DuoCortex community forum.">
  <link rel="canonical" href="https://duocortex.in/forum">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="DuoCortex">
  <meta property="og:title" content="Forum | DuoCortex">
  <meta property="og:description" content="Read discussions, questions and answers from verified medical students and professionals.">
  <meta property="og:url" content="https://duocortex.in/forum">
  <meta property="og:image" content="https://duocortex.in/assets/img/logo-1.png">

  <link rel="icon" href="/assets/img/logo-1.png" type="image/png">
  <link href="/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: "Open Sans", sans-serif; background: #fafbfc; color: #313035; }
    .forum-fallback { max-width: 600px; margin: 160px auto 80px; text-align: center; padding: 32px; }
    .forum-fallback h1 { font-family: "Montserrat", sans-serif; color: #6023d2; margin-bottom: 12px; }
    .forum-fallback .spinner { display: inline-block; width: 48px; height: 48px; border: 4px solid #eef0f3; border-top-color: #6023d2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 18px; }
    .forum-fallback a { color: #6023d2; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!--
    This is a fallback shell. In production, /forum is served by the Netlify
    Edge Function netlify/edge-functions/forum-list.js, which returns fully
    server-rendered HTML with the post list, JSON-LD, and pagination.

    This file only loads if the edge function fails (rare).
  -->
  <main>
    <div class="forum-fallback">
      <div class="spinner"></div>
      <h1>Loading the Forum…</h1>
      <p>If this page doesn't load in a few seconds, please <a href="/forum">try again</a> or visit our <a href="/announcements">Announcements</a>.</p>
    </div>
  </main>
</body>
</html>
